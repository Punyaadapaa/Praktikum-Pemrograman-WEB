<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GT3 RS — Portal</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <div class="overlay"></div>

    <div class="login-box" id="loginBox">
      <div class="login-header">
        <span class="brand">GT3 RS</span>
        <header>Login</header>
        <p>Access your garage portal</p>
      </div>

      <div class="notif" id="loginNotif"></div>

      <div class="input-box">
        <input type="text" id="loginEmail" class="input-field"
          placeholder="Email" autocomplete="off" />
      </div>

      <div class="input-box">
        <input type="password" id="loginPassword" class="input-field"
          placeholder="Password" autocomplete="off" />
      </div>

      <div class="forgot">
        <section>
          <input type="checkbox" id="check" />
          <label for="check">Remember Me</label>
        </section>
        <section>
          <a href="#">Forgot password?</a>
        </section>
      </div>

      <div class="input-submit">
        <button class="submit-btn" id="loginBtn"></button>
        <label for="loginBtn" id="loginBtnLabel">Login</label>
      </div>

      <div class="sign-up-link">
        <p>Don't have an account? <a href="#" id="goToRegister">Register</a></p>
      </div>
    </div>

    <div class="login-box hidden" id="registerBox">
      <div class="login-header">
        <span class="brand">GT3 RS</span>
        <header>Register</header>
        <p>Create your garage account</p>
      </div>

      <div class="notif" id="registerNotif"></div>

      <div class="input-box">
        <input type="text" id="regName" class="input-field"
          placeholder="Full Name" autocomplete="off" />
      </div>

      <div class="input-box">
        <input type="text" id="regUsername" class="input-field"
          placeholder="Username" autocomplete="off" />
      </div>

      <div class="input-box">
        <input type="email" id="regEmail" class="input-field"
          placeholder="Email" autocomplete="off" />
      </div>

      <div class="input-box">
        <input type="password" id="regPassword" class="input-field"
          placeholder="Password" autocomplete="off" />
      </div>

      <div class="input-submit" style="margin-top: 8px;">
        <button class="submit-btn" id="registerBtn"></button>
        <label for="registerBtn" id="registerBtnLabel">Register</label>
      </div>

      <div class="sign-up-link">
        <p>Already have an account? <a href="#" id="goToLogin">Login</a></p>
      </div>
    </div>



    <script src="main.js"></script>
  </body>
</html>
